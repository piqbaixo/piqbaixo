<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300" role="img" aria-label="Guilherme — Web Developer">
  <style>
    .ink   { fill: #14161a; }
    .muted { fill: #6b7280; }
    .rule  { stroke: #d0d4da; }
    @media (prefers-color-scheme: dark) {
      .ink   { fill: #ededed; }
      .muted { fill: #9aa1ac; }
      .rule  { stroke: #2a2f37; }
    }
    .eyebrow { font-family: ui-monospace,'SF Mono','Menlo','Consolas',monospace; font-size: 15px; letter-spacing: 9px; }
    .name    { font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-size: 96px; font-weight: 300; letter-spacing: 7px; }
    .caption { font-family: ui-monospace,'SF Mono','Menlo','Consolas',monospace; font-size: 15px; letter-spacing: 5px; }
  </style>

  <text x="380" y="78"  text-anchor="middle" class="eyebrow muted">WEB DEVELOPER</text>
  <text x="380" y="180" text-anchor="middle" class="name ink">Guilherme</text>
  <line x1="305" y1="218" x2="455" y2="218" class="rule" stroke-width="1"/>
  <text x="380" y="258" text-anchor="middle" class="caption muted">MOGI DAS CRUZES, SP &#183; BRASIL</text>
</svg>
