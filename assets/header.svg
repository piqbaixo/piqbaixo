
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 260" width="1100" height="260" role="img" aria-label="Guilherme — Web Developer">
  <style>
    .ink   { fill: #14161a; }
    .muted { fill: #6b7280; }
    .rule  { stroke: #d0d4da; }
    @media (prefers-color-scheme: dark) {
      .ink   { fill: #ededed; }
      .muted { fill: #9aa1ac; }
      .rule  { stroke: #2a2f37; }
    }
    .eyebrow { font-family: ui-monospace,'SF Mono','Menlo','Consolas',monospace; font-size: 13px; letter-spacing: 7px; }
    .name    { font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-size: 78px; font-weight: 300; letter-spacing: 6px; }
    .caption { font-family: ui-monospace,'SF Mono','Menlo','Consolas',monospace; font-size: 13px; letter-spacing: 4px; }
  </style>

  <text x="550" y="64"  text-anchor="middle" class="eyebrow muted">WEB DEVELOPER</text>
  <text x="550" y="150" text-anchor="middle" class="name ink">Guilherme</text>
  <line x1="490" y1="184" x2="610" y2="184" class="rule" stroke-width="1"/>
  <text x="550" y="222" text-anchor="middle" class="caption muted">MOGI DAS CRUZES, SP &#183; BRASIL</text>
</svg>
